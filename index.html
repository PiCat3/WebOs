<!DOCTYPE html>
<html>

  <body style="font-family:cursive; 
  background-image: url(graphics/GreenGrassField.jpg); 
  background-size: cover;">

    <div style="position:absolute; 
    top: 50%; left:50%; 
    transform: translate(-50%,-50%); 
    padding: 8px; 
    border: solid; 
    width: 512px; 
    background-color: White;
    border-radius: 16px";>
        <h1 style="padding-left: 4px; margin:4px;"><strong>Welcome to CatOS</strong></h1>
        <img style="width:10%; height:10%; border-radius:64px; object-fit:cover" src="graphics/CatHeadImage.jpg">
        <p><strong>CatOS is the best <abbr title="Operating System">OS</abbr> in the world!</strong></p>
        <p>Donate for the continued development of CatOS<br>- Half of <strong>all donations</strong> 
        also go to the wellbeing of <strong>rescue-kittens!</strong></p>
        <a href="https://www.paradoxinteractive.com/games/stellaris/add-ons?amount=20"><strong>Donate</strong></a>
        <p></p>
        <img style="width:75%; height:75%; object-fit:cover" src="graphics/CatImage.jpg" />
        <p></p>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"><dfn>*Meow*</dfn></a>
        <p style="color: red"><strong>Note: </strong> this OS is still a work in progress</p>
    </div>

    <div style="position: absolute;
    width: 99%;
    display:flex;
    backdrop-filter: blur(10px);
    background-color: rgba(0,0,0,0.25);
    color: #fff;
    display: flex;">
      <p id=timeElement style="margin-left: 24px; font-weight: 500; ">Time</p>
      <img style="margin-left: 550px; margin-top:20px; width:1%;height:1%; object-fit:cover" src="graphics/UserIcon2.jpg">
      <p style="font-weight: 500;">Users:</p>
      <p style="margin-left: 780px; margin-right: 15px;font-weight: 500;">CatOS</p>
    </div>

    <script>
        
        function updateTime() 
        {
          var currentTime = new Date().toLocaleString()
          var timeText = document.querySelector("#timeElement");
          timeText.innerHTML = currentTime
        }
        setInterval(updateTime, 1000);

    </script>
  </body>

</html>
