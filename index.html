<!DOCTYPE html>
<html>

  <body class="main">

    <div class="topbar" id="topbar">
      <p id=timeElement style="margin-left: 10px; color: black;">Time</p>
      <p class="OSname" id="welcomeopen"><img style="width: 6vh; height: 5vh; background-color: rgb(240, 153, 54); border-radius: 16px; padding: 3px;" src="graphics/CatOS_gradient_icon.png"></p>
    </div>

    <div class="welcomewindow" id="welcome">

        <div class="windowheader" id="welcomeheader">
          <div class="closebutton">
            <img class="closebuttonimg" id="welcomeclose" src="graphics/CatArmCleaner.png">
          </div>
        </div>

        <h1 class="welcomeheadertext"><strong>Welcome to CatOS</strong></h1>
        <p class="welcometext"> <strong>CatOS <img class="welcomecatimg" src="graphics/CatHeadImage.jpg"> 
        is the (very subjectly) best <abbr title="Operating System">OS</abbr> in the world!</strong></p>
        <p></p>
        <img class="welcomecatimgbig" src="graphics/CatImage.jpg" />
    </div>

    <div class="catgalleryAPP" id="catgalleryAPP">
      <div style="text-align:center; padding: 16px; width: fit-content;">
        <img class="catgalleryIcon" id="catgalleryopen" src="graphics/CatGalleryIconClean.png">
        <p style="margin: 0px; color:black"><strong>Cat Gallery</strong></p>
      </div>
    </div>

    <div class="window" id="catgallery">
      <div class="windowheader" id="catgalleryheader">
        <div class="closebutton">
          <img class="closebuttonimg" id="catgalleryclose" src="graphics/CatArmCleaner.png">
        </div>
      </div>
      <div>
        <h1 class="headertext"><strong>Cat Gallery</strong></h1>
      </div>
      <div class="catgalleryimagessection">
           <img class="catgalleryimages" id="catgalleryimages1" src="graphics/catimagesn9.png">
          <img class="catgalleryimages" id="catgalleryimages2" src="graphics/catimagesn8.2.png">
      </div>
    </div>

    <div class="catnotesAPP" id="catnotesAPP">
      <div style="text-align:center; padding: 16px; width:fit-content;">
        <img class="catnotesIcon" id="catnotesopen" src="graphics/CatNotesIcon.png">
        <p style="margin:0px; color:black;"><strong>Cat Notes</strong></p>
      </div>
    </div>

    <div class="window" id="catnotes">
      <div class="windowheader" id="catnotesheader">
        <div class="closebutton">
          <img class="closebuttonimg" id="catnotesclose" src="graphics/CatArmCleaner.png">
        </div>
      </div>
      <div>
          <h1 class="headertext"><strong>Cat Notes</strong></h1>
      </div>
    </div>

    <script type="module" src="./script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    

  </body>

</html>
