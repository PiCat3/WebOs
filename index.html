<!DOCTYPE html>
<html>

  <body class="main">

    <div class="welcomewindow" id="welcome">

        <div class="windowheader" id="welcomeheader">
          <p class="closebutton" id="welcomeclose">
            <img class="closebuttonimg" src="graphics/CatArmCleaner.png">
          </p>
        </div>

        <h1 class="welcomeheadertext"><strong>Welcome to CatOS</strong></h1>
        <p class="welcometext"> <strong>CatOS <img class="welcomecatimg" src="graphics/CatHeadImage.jpg">

        <img class="welcomecatimgbig" src="graphics/CatImage.jpg" />

      <p id=timeElement style="margin-left: 10px;">Time</p>

    </div>

    <div class="window" id="catgallery">

        <div class="windowheader" id="catgalleryheader">

            <div class="closebutton" id="catgalleryclose">

            </div>

        <h1 class="headertext"><strong>Cat Gallery</strong></p>

    </div>

    <head>
      <script type="module" src="./script.js"></script>
